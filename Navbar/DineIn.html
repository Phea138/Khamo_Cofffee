<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dine in</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- NAVBAR --- */
        .navbar {
            background-color: #eaa948;
            width: 100%;
            height: 80px;
            flex-shrink: 0;
        }

        .navbar ul {
            list-style: none;
            display: flex;
            height: 100%;
        }
        .navbar ul li:nth-child(1) a { color:#5d0f07; }

        .navbar ul li { flex: 1; display: flex; }

        .navbar ul li a {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            color: white;
            font-size: 28px;
            font-weight: 600;
            border-right: 2px solid white;
            transition: all 0.3s ease;
        }

        .navbar ul li a img { width: 30px; }
        .navbar ul li:last-child a { border-right: none; }

        .navbar ul li a:hover, .navbar ul li a.active {
            background-color: #d8963a;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        /* --- LAYOUT --- */
        .content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        section {
            flex: 1;
            background-color: #ededed;
            display: flex;
            flex-direction: column;
        }

        .box {
            margin: 10px;
            background-color: rgb(198, 198, 198);
            border-radius: 10px;
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .shop_name {
            display: flex;
            gap: 20px;
            padding: 10px 20px;
            align-items: center;
        }

        .shop_name h2 {
            font-size: 18px;
            font-family: 'Times New Roman', Times, serif;
        }

        /* --- SIDEBAR & HOVERS --- */
        aside {
            width: 220px;
            background-color: rgb(168, 160, 160);
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
            flex-shrink: 0;
        }

        aside ul {
            list-style: none;
            padding-top: 50px;
        }

        aside ul li { margin: 15px; }

        aside ul li a {
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: white;
            padding: 14px;
            border-radius: 10px;
            font-weight: bold;
            transition: all 0.25s ease;
        }

        /* Hover Effects Restored */
        aside ul li a:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.25);
        }

        #new ul li:nth-child(1) a { background-color: #2ecc71; }
        #new ul li:nth-child(1) a:hover { background-color: #27ae60; }

        #new ul li:nth-child(2) a { background-color: #f39c12; }
        #new ul li:nth-child(2) a:hover { background-color: #d68910; }

        aside > ul li:nth-child(1) a { background-color: #3498db; }
        aside > ul li:nth-child(1) a:hover { background-color: #2c80b9; }

        aside > ul li:nth-child(2) a { background-color: #e74c3c; }
        aside > ul li:nth-child(2) a:hover { background-color: #c0392b; }

        /* --- GRID FOR ORDERS --- */
        #dineInList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        /* --- RESPONSIVE FIXES --- */
        @media screen and (max-width: 768px) {
            body { overflow: auto; }
            .navbar { height: auto; }
            .navbar ul { flex-wrap: wrap; }
            .navbar ul li a { font-size: 18px; padding: 15px; }
            
            .content { flex-direction: column; height: auto; }
            aside { width: 100%; border-radius: 0; order: -1; }
            aside ul { display: flex; flex-wrap: wrap; padding: 10px; justify-content: center; }
            aside ul li { flex: 1; min-width: 120px; margin: 5px; }
            
            .box { height: 400px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <ul>
            <li><a href="/Khamo POS/POS_SYSTEM/Navbar/DineIn.html" class="active"><img src="/Khamo POS/POS_SYSTEM/img/restaurant_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg"> Dine in</a></li>
            <li><a href="/Khamo POS/POS_SYSTEM/Navbar/TakeAway.html"><img src="/Khamo POS/POS_SYSTEM/img/local_mall_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg"> Take Away</a></li>
            <li><a href="/Khamo POS/POS_SYSTEM/Navbar/TrackingProduct.html"><img src="/Khamo POS/POS_SYSTEM/img/edit_square_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg">Tracking Product</a></li>
        </ul>
    </nav>

    <div class="content">
        <section>
            <div class="box">
                <div id="dineInList"></div>
            </div>
            <div class="shop_name">
                <h2 id="store_id">Store ID: 1001</h2>
                <h2 id="shop_name">Shop Name: Khamo Coffee</h2>
            </div>
        </section>

        <aside>
            <div id="new">
                <ul>
                    <li><a href="/Khamo POS/POS_SYSTEM/StartOrder/New.html" onclick="localStorage.removeItem('selectedTable'); localStorage.setItem('orderType','Dine In')">New</a></li>
                    <li><a href="#" onclick="editOrder()">Edit</a></li>
                </ul>
            </div>
            <ul>
                <li><a href="#">Log in</a></li>
                <li><a href="/Khamo POS/POS_SYSTEM/index.html">Log out</a></li>
            </ul>
        </aside>
    </div>

    <script>
         function loadDineInOrders() {
                const orders = JSON.parse(localStorage.getItem("dineInOrders")) || [];
                const container = document.getElementById("dineInList");
                container.innerHTML = "";

                const dineInOnly = orders.filter(o =>
                    (o.orderType || "Dine In").toLowerCase().includes("dine") &&
                    !(o.orderType || "").toLowerCase().includes("take")
                );

                dineInOnly.forEach(order => {
                    const card = document.createElement("div");
                    card.style.cursor = "pointer";
                    card.style.background = "white";
                    card.style.margin = "10px";
                    card.style.padding = "15px";
                    card.style.borderRadius = "8px";
                    card.style.boxShadow = "0 2px 6px rgba(0,0,0,.2)";

                    card.onclick = function () {
                        selectedOrderId = order.id;
                        document.querySelectorAll("#dineInList div").forEach(d => {
                            d.style.border = "none";
                        });
                        card.style.border = "3px solid green";
                    };

                    card.innerHTML = `
            <strong>${order.table || 'No Table'}</strong><br>
            <span style="color:red;font-weight:bold;">UNPAID</span><br>
            <small>Time: ${order.time}</small><br>
            <strong>Total: $${order.total}</strong>
        `;


                    container.appendChild(card);
                });
            }

            /// this cancel order button  
            function cancelOrder(orderId) {

                let orders = JSON.parse(localStorage.getItem("dineInOrders")) || [];

                orders = orders.filter(order => order.id !== orderId);

                localStorage.setItem("dineInOrders", JSON.stringify(orders));

                loadDineInOrders();
            }

            // this function editorder when user not yet pay
            function editOrder() {

                if (!selectedOrderId) {
                    alert("Please select a table first");
                    return;
                }

                const orders = JSON.parse(localStorage.getItem("dineInOrders")) || [];

                const order = orders.find(o => o.id === selectedOrderId);

                if (!order) {
                    alert("Order not found");
                    return;
                }

                // Save selected table
                localStorage.setItem("selectedTable", order.table);
                localStorage.setItem("orderType", "Dine in");
                window.location.href = "../StartOrder/New.html";
                // window.location.replace("../Navbar/DineIn.html");
            }


            function deleteItem(orderId, itemIndex) {
                let orders = JSON.parse(localStorage.getItem("dineInOrders")) || [];

                orders = orders.map(order => {
                    if (order.id === orderId) {
                        order.items.splice(itemIndex, 1);
                    }
                    return order;
                });

                orders = orders.filter(order => order.items.length > 0);

                localStorage.setItem("dineInOrders", JSON.stringify(orders));
                loadDineInOrders();
            }

            loadDineInOrders();
    </script>
</body>
</html>
